<div class="page-wrapper">
  <div class="page-header">
    <h2>Add New Event</h2>
    <p>Fill in the details to create a new campus event</p>
  </div>

  <mat-card class="form-card">
    <div class="form-field">
      <label>Event Title</label>
      <input type="text" [(ngModel)]="newEvent.eventTitle"
             name="eventTitle" placeholder="e.g. Tech Workshop" />
    </div>

    <div class="form-field">
      <label>Location</label>
      <input type="text" [(ngModel)]="newEvent.location"
             name="location" placeholder="e.g. Lab A" />
    </div>

    <div class="form-field">
      <label>Ticket Price</label>
      <input type="text" [(ngModel)]="newEvent.ticketPrice"
             name="ticketPrice" placeholder="e.g. $50 or Free" />
    </div>

    <div class="form-actions">
      <button class="btn-submit" mat-flat-button
        [disabled]="!newEvent.eventTitle || !newEvent.location || !newEvent.ticketPrice"
        (click)="addEvent()">Submit</button>
      <button class="btn-cancel" mat-stroked-button
        (click)="cancel()">Cancel</button>
    </div>
  </mat-card>
</div>
